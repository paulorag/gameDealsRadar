spring.application.name=radar

# Tenta usar a DB_URL da nuvem, se não achar, usa o localhost SEM SSL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/radar_db?sslmode=disable}

# Tenta usar o usuário da nuvem, se não achar, usa o admin do Docker
spring.datasource.username=${DB_USERNAME:admin}

# Tenta usar a senha da nuvem, se não achar, usa o password do Docker
spring.datasource.password=${DB_PASSWORD:password}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.cache.cache-names=popularGames,userGames,gameHistory